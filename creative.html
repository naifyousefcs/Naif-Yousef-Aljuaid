<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificates — Naif Aljuaid</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#f8f7f4;
  --surface:#ffffff;
  --border:#e0dbd3;
  --ink:#1a1814;
  --ink2:#4a4540;
  --ink3:#8a837a;
  --blue:#1a3a5c;
  --shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--ink);
}

/* NAV */
nav{
  position:fixed;
  top:0;left:0;right:0;
  background:rgba(248,247,244,0.9);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(10px);
}
.nav-inner{
  max-width:1100px;
  margin:auto;
  padding:1rem 2rem;
  display:flex;
  justify-content:space-between;
}
.nav-logo{
  font-family:'Playfair Display';
  font-weight:700;
}
.nav-logo span{color:var(--blue);}

/* SECTION */
section{
  max-width:1100px;
  margin:auto;
  padding:120px 2rem 60px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:1.5rem;
}

/* CARD */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:1.2rem;
  transition:0.25s;
}
.card:hover{
  transform:translateY(-6px);
  border-color:var(--blue);
  box-shadow:var(--shadow);
}

.card-title{
  font-weight:600;
  margin-bottom:0.8rem;
}

/* IMAGE */
.card-img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
  transition:0.25s;
}
.card-img:hover{
  transform:scale(1.03);
}

/* COMING SOON */
.coming{
  height:180px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#f0ede7;
  border-radius:10px;
  color:var(--ink3);
}

/* MODAL */
.hidden{display:none;}
.modal{
  position:fixed;
  inset:0;
  z-index:1000;
}
.modal-bg{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.75);
}
.modal-box{
  position:relative;
  max-width:800px;
  width:90%;
  margin:5% auto;
  background:#111;
  padding:10px;
  border-radius:12px;
}
.modal-box img{
  width:100%;
  border-radius:10px;
}
.close{
  position:absolute;
  top:-10px;
  right:-10px;
  width:35px;
  height:35px;
  border-radius:50%;
  border:none;
  cursor:pointer;
  font-size:20px;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <div class="nav-logo">Naif <span>Aljuaid</span></div>
    <a href="index.html">← Back</a>
  </div>
</nav>

<!-- CONTENT -->
<section>
  <h2 style="margin-bottom:2rem;">Certification Proof</h2>

  <div class="grid">

    <!-- Security+ -->
    <div class="card">
      <div class="card-title">CompTIA Security+</div>
      <img src="security-plus-badge.png" class="card-img" data-img="security-plus-badge.png">
    </div>

    <!-- eJPT -->
    <div class="card">
      <div class="card-title">INE eJPTv2</div>
      <div class="coming">Coming Soon</div>
    </div>

  </div>
</section>

<!-- MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-bg"></div>
  <div class="modal-box">
    <button class="close">&times;</button>
    <img id="modal-img">
  </div>
</div>

<script>
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modal-img");

// OPEN
document.addEventListener("click",(e)=>{
  const img = e.target.closest(".card-img");
  if(!img) return;

  modalImg.src = img.dataset.img;
  modal.classList.remove("hidden");
});

// CLOSE
function closeModal(){
  modal.classList.add("hidden");
  modalImg.src="";
}

document.querySelector(".close").onclick = closeModal;
document.querySelector(".modal-bg").onclick = closeModal;

document.addEventListener("keydown",(e)=>{
  if(e.key==="Escape") closeModal();
});
</script>

</body>
</html>
